<h2>JavaScript If Else</h2>

<p>A time-based greeting:</p>

<p id="demo"></p>

<script>



const hour = new Date().getHours(); 

let greeting;

if (hour < 12) {
  greeting = "Good day";
} else {
  greeting = "Good evening";
}

document.getElementById("demo").innerHTML = greeting;


var a = "50";

if(a>b)
{

}
else if(a<b)
{
  document.write("B Grater than A");
}



</script>
